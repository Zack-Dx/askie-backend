name: Deploy Node Application

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t harshit1609/askie_backend .

      - name: Publish Image to Docker Hub
        run: docker push harshit1609/askie_backend:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Pull Image from Docker Hub
        run: docker pull harshit1609/askie_backend:latest

      - name: Remove Existing Container (if exists)
        run: docker rm -f nodejs-app-container || true

      - name: Run Docker Container
        run: |
          docker run -d -p 7777:7777 --name nodejs-app-container \
            -e NODE_ENV=${{ secrets.NODE_ENV }} \
            -e PORT=${{ secrets.PORT }} \
            -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
            -e CLIENT_URL=${{ secrets.CLIENT_URL }} \
            -e API_VERSION=${{ secrets.API_VERSION }} \
            -e GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
            -e GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} \
            -e GIT_CLIENT_ID=${{ secrets.GIT_CLIENT_ID }} \
            -e GIT_CLIENT_SECRET=${{ secrets.GIT_CLIENT_SECRET }} \
            -e CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }} \
            -e CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }} \
            -e CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }} \
            -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
            -e PAYMENT_SECRET_KEY=${{ secrets.PAYMENT_SECRET_KEY }} \
            -e PAYMENT_KEY_ID=${{ secrets.PAYMENT_KEY_ID }} \
            -e PAYMENT_WEBHOOK_SECRET=${{ secrets.PAYMENT_WEBHOOK_SECRET }} \
            -e PREMIUM_MONTHLY_PRICE=${{ secrets.PREMIUM_MONTHLY_PRICE }} \
            -e PREMIUM_YEARLY_PRICE=${{ secrets.PREMIUM_YEARLY_PRICE }} \
            -e AI_KEY=${{ secrets.AI_KEY }} \
            harshit1609/askie_backend:latest
